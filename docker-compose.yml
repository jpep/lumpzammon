services:
  app:
    build: ./app
    ports:
      - "3000:80"

  dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./app:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles:
      - dev

volumes:
  node_modules:
